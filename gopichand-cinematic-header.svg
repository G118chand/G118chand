<svg width="1200" height="360" viewBox="0 0 1200 360" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="45%" stop-color="#15113d"/>
      <stop offset="75%" stop-color="#082f49"/>
      <stop offset="100%" stop-color="#042f2e"/>
    </linearGradient>

    <linearGradient id="title" x1="0" x2="1">
      <stop stop-color="#c4b5fd"/>
      <stop offset="35%" stop-color="#ffffff"/>
      <stop offset="65%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#6ee7b7"/>
    </linearGradient>

    <linearGradient id="trail" x1="0" x2="1">
      <stop stop-color="#8b5cf6" stop-opacity="0"/>
      <stop offset="55%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>

    <radialGradient id="planet">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="55%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#312e81"/>
    </radialGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <path id="orbitPath"
          d="M190 215
             A410 112 0 1 1 1010 215
             A410 112 0 1 1 190 215"/>
  </defs>

  <rect width="1200" height="360" rx="28" fill="url(#sky)"/>

  <g fill="#e0f2fe">
    <circle cx="70" cy="55" r="2">
      <animate attributeName="opacity" values=".2;1;.2" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="170" cy="118" r="1.5">
      <animate attributeName="opacity" values="1;.2;1" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="310" cy="48" r="2">
      <animate attributeName="opacity" values=".2;1;.2" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="455" cy="102" r="1.5">
      <animate attributeName="opacity" values="1;.2;1" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="620" cy="42" r="2">
      <animate attributeName="opacity" values=".2;1;.2" dur="2.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="775" cy="112" r="1.5">
      <animate attributeName="opacity" values="1;.2;1" dur="1.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="930" cy="55" r="2">
      <animate attributeName="opacity" values=".2;1;.2" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1110" cy="110" r="1.5">
      <animate attributeName="opacity" values="1;.2;1" dur="1.7s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g transform="translate(1060 15)" opacity=".75">
    <circle cx="70" cy="70" r="62" fill="url(#planet)" filter="url(#glow)"/>
    <ellipse cx="70" cy="73" rx="105" ry="22"
             fill="none" stroke="#67e8f9" stroke-width="3"
             transform="rotate(-14 70 73)"/>
  </g>

  <use href="#orbitPath"
       fill="none"
       stroke="#67e8f9"
       stroke-width="1.5"
       stroke-dasharray="5 14"
       opacity=".22"/>

  <g filter="url(#glow)">
    <animateMotion dur="9s" repeatCount="indefinite" rotate="auto">
      <mpath href="#orbitPath"/>
    </animateMotion>

    <path d="M-120 0H-32" stroke="url(#trail)" stroke-width="4"/>
    <path d="M-88 11H-32" stroke="url(#trail)" stroke-width="2" opacity=".6"/>
    <path d="M-68-11H-32" stroke="url(#trail)" stroke-width="2" opacity=".5"/>

    <path d="M-36 0L4-17L47 0L4 17Z"
          fill="#e2e8f0" stroke="#67e8f9" stroke-width="2"/>

    <path d="M-3-15L15-31L23-7Z"
          fill="#8b5cf6" stroke="#c4b5fd"/>

    <path d="M-3 15L15 31L23 7Z"
          fill="#2563eb" stroke="#67e8f9"/>

    <ellipse cx="18" cy="0" rx="10" ry="7" fill="#082f49"/>
    <circle cx="18" cy="0" r="4" fill="#22d3ee"/>
  </g>

  <text x="600" y="225"
        text-anchor="middle"
        fill="url(#title)"
        font-family="Arial Black, Arial, sans-serif"
        font-size="62"
        font-weight="900"
        letter-spacing="8"
        filter="url(#glow)">
    GOPICHAND HINGE
  </text>

  <path d="M310 255H890"
        stroke="url(#title)"
        stroke-width="3"
        filter="url(#glow)"/>

  <text x="600" y="300"
        text-anchor="middle"
        fill="#67e8f9"
        font-family="monospace"
        font-size="16"
        letter-spacing="6">
    WELCOME TO MY WORLD
  </text>

  <rect x="1" y="1" width="1198" height="358" rx="27"
        fill="none" stroke="#64748b" stroke-opacity=".35" stroke-width="2"/>
</svg>
