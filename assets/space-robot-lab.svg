<svg width="1200" height="380" viewBox="0 0 1200 380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="50%" stop-color="#171145"/>
      <stop offset="100%" stop-color="#042f3e"/>
    </linearGradient>

    <linearGradient id="neon" x1="0" x2="1">
      <stop stop-color="#8b5cf6"/>
      <stop offset="50%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="380" rx="26" fill="url(#background)"/>

  <g fill="#e0f2fe">
    <circle cx="90" cy="55" r="2">
      <animate attributeName="opacity" values=".2;1;.2" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="250" cy="110" r="2">
      <animate attributeName="opacity" values="1;.2;1" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="480" cy="48" r="2">
      <animate attributeName="opacity" values=".2;1;.2" dur="2.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="760" cy="95" r="2">
      <animate attributeName="opacity" values="1;.2;1" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1030" cy="48" r="2">
      <animate attributeName="opacity" values=".2;1;.2" dur="2.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <text x="60" y="175" fill="#f8fafc"
        font-family="monospace" font-size="32" font-weight="bold">
    AUTONOMOUS SYSTEMS LAB
  </text>

  <text x="60" y="215" fill="#67e8f9"
        font-family="monospace" font-size="16" letter-spacing="3">
    ROBOTICS | AI | SPACE COMPUTE
  </text>

  <text x="60" y="250" fill="#94a3b8"
        font-family="monospace" font-size="14">
    SATELLITE LINK: ACTIVE
    <animate attributeName="opacity" values=".3;1;.3" dur="1.2s" repeatCount="indefinite"/>
  </text>

  <g transform="translate(0 85)" filter="url(#glow)">
    <g>
      <animateTransform attributeName="transform" type="translate"
                        from="-130 0" to="1330 0"
                        dur="9s" repeatCount="indefinite"/>

      <rect x="-30" y="-16" width="60" height="32" rx="7"
            fill="#cbd5e1" stroke="#22d3ee" stroke-width="2"/>

      <rect x="-92" y="-23" width="50" height="46"
            fill="#1d4ed8" stroke="#93c5fd"/>

      <rect x="42" y="-23" width="50" height="46"
            fill="#1d4ed8" stroke="#93c5fd"/>

      <circle cx="0" cy="0" r="9" fill="#111827"/>
      <circle cx="0" cy="0" r="4" fill="#22d3ee"/>

      <path d="M0 16V40" stroke="#cbd5e1" stroke-width="4"/>
      <path d="M-16 40Q0 57 16 40"
            fill="none" stroke="#22d3ee" stroke-width="4"/>
    </g>
  </g>

  <path d="M0 325H1200" stroke="url(#neon)"
        stroke-width="4" filter="url(#glow)"/>

  <g transform="translate(0 255)">
    <g>
      <animateTransform attributeName="transform" type="translate"
                        from="-100 0" to="1300 0"
                        dur="7s" repeatCount="indefinite"/>

      <rect x="8" y="0" width="48" height="36" rx="10"
            fill="#111827" stroke="#22d3ee" stroke-width="3"/>

      <rect x="15" y="36" width="34" height="42" rx="7"
            fill="#1e293b" stroke="#8b5cf6" stroke-width="3"/>

      <circle cx="23" cy="16" r="5" fill="#34d399"/>
      <circle cx="41" cy="16" r="5" fill="#34d399"/>

      <path d="M32 0V-13M24-13H40"
            stroke="#67e8f9" stroke-width="3"/>

      <path stroke="#67e8f9" stroke-width="8" stroke-linecap="round">
        <animate attributeName="d"
                 values="M24 78L10 105M41 78L56 105;M24 78L42 105M41 78L23 105;M24 78L10 105M41 78L56 105"
                 dur=".45s" repeatCount="indefinite"/>
      </path>
    </g>
  </g>

  <rect x="1" y="1" width="1198" height="378" rx="25"
        fill="none" stroke="#64748b" stroke-opacity=".4" stroke-width="2"/>
</svg>
